# vim: set ft=tmux:

# reload config with <prefix> + R
# ---
# check set options:
# show-options [-spw] [-g],
#   -s (server), -p (pane), -w (window)
#   -g (global)
# ---
# common key bindings
# ---
# prefix: Option-a
#
# portable tmux bindings:
#   prefix c          new window
#   prefix p/n        previous/next window
#   prefix w          window picker
#   prefix s          session picker
#   prefix x          kill pane
#   prefix X          kill window
#   prefix O          leave only this window open
#   prefix arrows     select pane
#   prefix H/J/K/L    resize pane
#   prefix h          split top/bottom
#   prefix v          split left/right
#   prefix q          show pane numbers
#   prefix Space      tmux-which-key menu
#
# status line:
#   left              session name, prefix indicator, active tmux pane mode
#   right             battery, date/time, host
#
# no-prefix bindings:
#   Ctrl-h/j/k/l      switch panes via vim-tmux-navigator
#
# macOS/iTerm2 profile mappings:
#   Cmd-Shift-Left    previous window
#   Cmd-Shift-Right   next window
#   Cmd-Shift-Down    new window
#   Cmd-Shift-X       kill window
#   Cmd-Option-arrows select pane
#   Cmd-Option-X      kill pane
#
# iTerm2 sends private escape sequences for the Cmd-* mappings; tmux receives
# them as User0..User8 below. Bare Option-arrows are intentionally left free for
# shells, editors, and TUIs such as Codex.
# ---
# copy mode
# most keybindings resemble the ones of vim:
#   How to copy:
#     prefix + [ or prefix + Enter to enter tmux vi copy mode
#     Begin highlight with Space/v (visual selection), V (linewise selection)
#     Toggle rectangle mode with Ctrl-v; start rectangle selection with Ctrl-q
#     Copy and exit with Enter; copy without exiting with y or Ctrl-c
#     Paste with prefix + ]
#   ---
#   How to scroll:
#     Half page down               C-d
#     Half page up                 C-u
#     Next page                    C-f
#     Previous page                C-b
#     Scroll down                  C-Down or C-e
#     Scroll up                    C-Up or C-y
#   How to search:
#     Search          / or ? (forward, backward)
#     Search again    n or N (forward, backward)
#
# ----------------------------------------------
#

set -g default-terminal "tmux-256color"
set -gq -u terminal-overrides
set -gq -u terminal-features
set -as terminal-features ',xterm-256color:RGB:extkeys'
set -s extended-keys on
set -s extended-keys-format csi-u

set -g focus-events on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

# Let escape sequences pass through (generally helpful with modern terminals)
set -g allow-passthrough on

# Enable bell monitoring and show bell alerts for any window (not just current)
set -g monitor-bell on
set -g monitor-activity off
set -g bell-action any

set -g status-interval 5
set -g automatic-rename on
# show directory name for shells, command name for everything else
set -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}"

# better mouse support via 'nhdaly/tmux-better-mouse-mode'
set -g mouse on
set -g @scroll-down-exit-copy-mode "on"
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"
set -g @scroll-speed-num-lines-per-scroll "3"

# copy mode
# use vi-style key bindings in copy mode
setw -g mode-keys vi

# enter copy-mode with Enter
bind Enter copy-mode

# add more vi-style key bindings:
#   - visual mode with 'v'
#   - visual rectange mode with 'ctrl-v'/'ctrl-q'
#   - yank with 'y'
unbind -T copy-mode-vi v
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi м send -X begin-selection
bind -T copy-mode-vi 'C-q' send -X rectangle-toggle \; send -X begin-selection
bind -T copy-mode-vi 'C-c' send -X copy-pipe
bind -T copy-mode-vi y send -X copy-pipe
bind -T copy-mode-vi н send -X copy-pipe
# pasting with lowercase 'p' is not possible as this keybinding is used for going to prev window
bind P paste-buffer
# copy with dragging
# not needed, already works
# bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'clip'

# set low value to avoid any delay when switching modes in Vim
set -s escape-time 10
# time in ms to repeat the last keybind if it's repeatable (-r option).
# For instance, <prefix> + x closes the current pane and can be repeated;
# or <prefix> + </>, which moves the window
set -g repeat-time 400

# set a new prefix
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# iTerm2 profile key mappings send these private escape sequences for
# macOS-style Command shortcuts. Bare Shift/Option arrows are left for shells,
# editors, and TUIs such as Codex.
set -s user-keys[0] "\e[9001~" # Cmd-Shift-Left
set -s user-keys[1] "\e[9002~" # Cmd-Shift-Right
set -s user-keys[2] "\e[9011~" # Cmd-Option-Left
set -s user-keys[3] "\e[9012~" # Cmd-Option-Down
set -s user-keys[4] "\e[9013~" # Cmd-Option-Up
set -s user-keys[5] "\e[9014~" # Cmd-Option-Right
set -s user-keys[6] "\e[9003~" # Cmd-Shift-Down
set -s user-keys[7] "\e[9004~" # Cmd-Shift-X
set -s user-keys[8] "\e[9015~" # Cmd-Option-X

bind -n User0 previous-window
bind -n User1 next-window
bind -n User2 select-pane -L
bind -n User3 select-pane -D
bind -n User4 select-pane -U
bind -n User5 select-pane -R
bind -n User6 new-window -c "#{pane_current_path}"
bind -n User7 kill-window
bind -n User8 kill-pane

bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

bind -r "x" kill-pane
bind -r "X" kill-window
# close all windows but current
bind "O" kill-window -a

# buffer picker
bind b choose-buffer

# add more intuitive keybindings
# I use reversed horizontal/vertical mappings because these make much more sense to me
bind-key h split-window -v -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ------------
# Status line
# ------------

# Inherit colors from the terminal palette where possible. The terminal owns
# the palette; tmux uses ANSI/default colors instead of hardcoded theme hex.

set -g status-justify "left"
set -g status "on"
set -g status-right-length "100"
set -g status-left-length "100"

set -g status-style "none,fg=default,bg=default"
set -g status-left-style "none,fg=cyan,bg=default"
set -g status-right-style "none,fg=brightblack,bg=default"
set -g message-style "fg=black,bg=yellow"
set -g message-command-style "fg=black,bg=cyan"
set -g mode-style "fg=black,bg=magenta"

set -g pane-active-border-style "fg=green"
set -g pane-border-style "fg=brightblack"

setw -g window-status-style "none,fg=brightblack,bg=default"
setw -g window-status-activity-style "none,fg=yellow,bg=default"
setw -g window-status-bell-style "none,fg=brightblack,bg=default"
setw -g window-status-last-style "none,fg=brightblack,bg=default"
setw -g window-status-current-style "bold,fg=yellow,bg=black"
setw -g window-status-separator "#[fg=brightblack,bg=default] | "

# Left
set -g status-left "#[fg=cyan,bg=default,bold] #S #[default]#{?client_prefix,#[fg=magenta#,bg=default#,bold] prefix #[default],}#{?pane_mode,#[fg=magenta#,bg=default#,bold] #{pane_mode} #[default],}"

# Right
set -g status-right "#[fg=brightblack,bg=default]bat #[fg=yellow]#{battery_percentage} #[fg=brightblack]| %Y-%m-%d #[fg=yellow]%H:%M #[fg=cyan]#h "
# Inactive window
setw -g window-status-format "#[fg=brightblack,bg=default] #I:#W#{?window_bell_flag,#[fg=red]!,} "

# Active window
setw -g window-status-current-format "#[fg=yellow,bg=black,bold] #I:#W #[default]"


# define modules to be used
# ---



# --------------
# tmux continuum
# --------------

# in minutes
set -g @continuum-save-interval '1'
set -g @continuum-restore 'on'


# --------
# PLUGINS
# --------

# Install plugins with <prefix> + I
# Update plugins with <prefix> + U

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible#v3.0.0'

# switch seamlessly between both tmux and vim panes
# the same plugin is installed in Vim as well
# the default mappings are Ctrl-h/j/k/l
set -g @plugin 'christoomey/vim-tmux-navigator#v1.0'

set -g @plugin 'soyuka/tmux-current-pane-hostname'

set -g @plugin 'nhdaly/tmux-better-mouse-mode'

set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @plugin 'tmux-plugins/tmux-battery'

set -g @plugin 'tmux-plugins/tmux-resurrect#v4.0.0'
set -g @plugin 'tmux-plugins/tmux-continuum#v3.1.0'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
