images:
  - location: https://cloud-images.ubuntu.com/releases/questing/release-20251212/ubuntu-25.10-server-cloudimg-amd64.img
    arch: x86_64
    digest: sha256:3d0977875af04e32a0eb176d73e7164df18cd774a8e0a51605584627490837a1
  - location: https://cloud-images.ubuntu.com/releases/questing/release-20251212/ubuntu-25.10-server-cloudimg-arm64.img
    arch: aarch64
    digest: sha256:ec93c8acae3e7630daf723e31716703639417d86b87eb6962f3a0003d1045c15

mounts:
  - location: "~/IdeaProjects"
    mountPoint: "/Users/{{.User}}/IdeaProjects"
    writable: true

portForwards:
  - guestSocket: "/var/run/docker.sock"
    hostSocket: "{{.Dir}}/sock/docker.sock"

provision:
  - mode: user
    file: vm-provision.sh

probes:
  - mode: readiness
    description: VM toolchain is ready
    script: |
      #!/usr/bin/env bash
      set -euo pipefail

      command -v docker >/dev/null
      test -S /var/run/docker.sock
      sudo systemctl is-active --quiet docker
      sudo docker info >/dev/null 2>&1

      command -v mise >/dev/null
      mise x -- node --version >/dev/null
      mise x -- go version >/dev/null
      mise x -- rustc --version >/dev/null
      mise x -- java -version >/dev/null 2>&1
      mise x -- uv --version >/dev/null

      command -v gh >/dev/null
    hint: |
      The VM did not finish provisioning mandatory tools.
      Check /var/log/cloud-init-output.log inside the VM.
